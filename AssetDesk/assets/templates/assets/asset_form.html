{% extends "base.html" %}

{% block title %}{{ form_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">

        <div class="card shadow-sm">
            <div class="card-header">
                <h4 class="mb-0">{{ form_title }}</h4>
            </div>

            <div class="card-body">

                <form method="post">
                    {% csrf_token %}

                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">
                                {{ field.label }}
                            </label>

                            {{ field }}

                            {% if field.errors %}
                                <div class="text-danger small">
                                    {{ field.errors }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-flex gap-2">
                        <button class="btn btn-primary">
                            {{ btn_label }}
                        </button>

                        <a href="{% url 'asset-list' %}"
                           class="btn btn-secondary">
                            Cancel
                        </a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
